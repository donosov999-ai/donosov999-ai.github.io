    background:rgba(8,8,11,.65);backdrop-filter:saturate(160%) blur(18px);border-bottom:1px solid var(--line)}
  nav .inner{max-width:1040px;margin:0 auto;width:100%;padding:0 22px;display:flex;align-items:center;gap:24px}

  nav a:hover{color:var(--txt)}

  .langbar{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:24px 0 0}
  .langbar button{background:var(--surface);color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:5px 13px;font-size:12.5px;cursor:pointer;transition:.2s}
  .langbar button.on{background:var(--txt);color:#000;border-color:var(--txt);font-weight:600}

  header{text-align:center;padding:72px 0 26px}
  .mark{width:60px;height:60px;margin:0 auto 22px;color:var(--accent)}
  h1{font-size:clamp(42px,7.5vw,76px);font-weight:800;letter-spacing:-.035em;line-height:1;
    background:linear-gradient(180deg,#fff,#c9c9d6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{color:var(--mut);font-size:clamp(17px,2.4vw,21px);max-width:600px;margin:20px auto 30px;letter-spacing:-.01em}
  .cta{display:flex;gap:13px;justify-content:center;flex-wrap:wrap}
  .btn{text-decoration:none;font-weight:600;font-size:16px;padding:14px 30px;border-radius:14px;letter-spacing:-.01em;transition:transform .15s,box-shadow .2s}

  .btn.p{background:var(--accent);color:#fff;box-shadow:0 8px 30px rgba(124,92,255,.4)}
  .btn.s{background:var(--surface);color:var(--txt);border:1px solid var(--line);backdrop-filter:blur(10px)}
  /* sections */
  .sec{padding:46px 0}
  h2{font-size:clamp(26px,4vw,38px);font-weight:800;text-align:center;letter-spacing:-.03em;margin-bottom:6px}
  .h2sub{text-align:center;color:var(--mut);font-size:15px;margin-bottom:30px;letter-spacing:-.01em}
  .grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:26px;
    backdrop-filter:blur(24px) saturate(140%);box-shadow:0 1px 0 rgba(255,255,255,.05) inset,0 18px 50px -20px rgba(0,0,0,.7)}

  .card h3{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:5px}
  .card p{color:var(--mut);font-size:14.5px}
  .progs{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .prog{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;backdrop-filter:blur(20px)}
  .prog .n{font-weight:700;font-size:16px;letter-spacing:-.02em}
  .prog .aud{color:var(--accent);font-size:12px;margin:3px 0 9px;font-weight:500}
  .prog .d{color:var(--mut);font-size:13.5px;line-height:1.5}
  .doms{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
  .dom{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:10px 18px;font-size:14.5px;font-weight:500}
  .dom svg{width:18px;height:18px;color:var(--accent)}
  .sci{max-width:680px;margin:0 auto;color:var(--mut);font-size:14px;text-align:center;line-height:1.65;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px 26px;backdrop-filter:blur(20px)}
  .band{background:linear-gradient(135deg,rgba(124,92,255,.22),var(--surface));border:1px solid var(--line);border-radius:26px;padding:46px 26px;text-align:center;margin:46px 0}
  .band h2{margin-bottom:18px}
  footer{text-align:center;color:var(--mut);font-size:13px;padding:30px 0 50px;border-top:1px solid var(--line)}
  footer a{color:var(--accent);text-decoration:none}
  .badge{display:inline-block;font-size:11px;color:var(--accent);border:1px solid var(--line);border-radius:999px;padding:4px 12px;margin-top:16px;letter-spacing:.02em}
</style>

const ORDER=["en","ru","es","de","zh","hi"];
function apply(l){
 const d=I18N[l]||I18N.en;document.documentElement.lang=l;
 document.querySelectorAll("[data-i18n]").forEach(e=>{e.textContent=d[e.getAttribute("data-i18n")]||"";});
 const h=document.getElementById("hooks");h.innerHTML="";
 (d.hooks||[]).forEach(x=>{const el=document.createElement("div");el.className="card";
  el.innerHTML='<div class="ic">'+(I[x[0]]||"")+'</div><h3></h3><p></p>';
  el.querySelector("h3").textContent=x[1];el.querySelector("p").textContent=x[2];h.appendChild(el);});
 const pg=document.getElementById("progs");pg.innerHTML="";
 (d.progs||[]).forEach(p=>{const el=document.createElement("div");el.className="prog";
  el.innerHTML='<div class="n"></div><div class="aud"></div><div class="d"></div>';
  el.querySelector(".n").textContent=p[0];el.querySelector(".aud").textContent=p[1];el.querySelector(".d").textContent=p[2];pg.appendChild(el);});
 const dm=document.getElementById("doms");dm.innerHTML="";
 (d.doms||[]).forEach(x=>{const el=document.createElement("div");el.className="dom";
  el.innerHTML=(I[x[0]]||"")+'<span></span>';el.querySelector("span").textContent=x[1];dm.appendChild(el);});
 document.querySelectorAll("#langbar button").forEach(b=>b.classList.toggle("on",b.dataset.l===l));
 try{localStorage.setItem("pg_lang",l);}catch(e){}
}
const bar=document.createElement("div");bar.className="langbar";bar.id="langbar";
document.querySelector("header").after(bar);
ORDER.forEach(l=>{const b=document.createElement("button");b.textContent=I18N[l].name;b.dataset.l=l;b.onclick=()=>apply(l);bar.appendChild(b);});
let init="en";try{const s=localStorage.getItem("pg_lang");if(s&&I18N[s])init=s;else{const n=(navigator.language||"en").slice(0,2);if(I18N[n])init=n;}}catch(e){}
apply(init);
