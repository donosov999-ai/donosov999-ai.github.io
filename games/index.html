<style>
  :root{--bg:#0f0e17;--card:#1a1925;--accent:#a855f7;--accent2:#fbbf24;--txt:#e8e6f0;--mut:#9b96b0;--line:#2a2838}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Noto Sans",sans-serif;line-height:1.55}
  .wrap{max-width:920px;margin:0 auto;padding:18px 20px 60px}
  nav{display:flex;gap:16px;flex-wrap:wrap;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
  nav a{color:var(--mut);text-decoration:none}nav a.brand{color:var(--txt);font-weight:800;font-size:16px;margin-right:auto}nav a:hover{color:var(--txt)}
  .langbar{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0}
  .langbar button{background:var(--card);color:var(--mut);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12.5px;cursor:pointer}
  .langbar button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  h1{font-size:30px;font-weight:800;margin:18px 0 6px;letter-spacing:-.5px}
  .intro{color:var(--mut);font-size:15px;margin-bottom:22px}
  .cat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  .cat .h{font-weight:800;font-size:17px;margin-bottom:2px}
  .cat .d{color:var(--mut);font-size:13px;margin-bottom:10px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:12.5px;color:var(--txt)}
  .band{background:linear-gradient(135deg,#2a1a4a,#1a1925);border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center;margin:30px 0}
  .btn{display:inline-block;text-decoration:none;font-weight:700;background:var(--accent);color:#fff;padding:13px 26px;border-radius:11px}
  footer{text-align:center;color:var(--mut);font-size:12.5px;margin-top:34px;border-top:1px solid var(--line);padding-top:20px}
  a.link{color:var(--accent)}
</style>
</head>
<body>

  g_title:"Alle 48 Trainer",g_intro:"Validierte Paradigmen der kognitiven Wissenschaft, in vier Domänen. 12 Gedächtnis · 7 Aufmerksamkeit · 14 Logik · 15 Aktion = 48.",

  cta_dl:"सभी 48 मुफ़्त पाएँ",foot:"© 2026 PsyGames · Denis Onosov (ODV999)",priv:"गोपनीयता"}
};
const ORDER=["en","ru","es","de","zh","hi"];
function apply(l){
 const d=I18N[l]||I18N.en;document.documentElement.lang=l;
 document.querySelectorAll("[data-i18n]").forEach(e=>{e.textContent=d[e.getAttribute("data-i18n")]||"";});
 const c=document.getElementById("cats");c.innerHTML="";
 CATORDER.forEach(k=>{const m=d.cats[k];const el=document.createElement("div");el.className="cat";
  el.innerHTML='<div class="h"></div><div class="d"></div><div class="chips"></div>';
  el.querySelector(".h").textContent=m[0];el.querySelector(".d").textContent=m[1];
  const ch=el.querySelector(".chips");CATGAMES[k].forEach(g=>{const s=document.createElement("span");s.className="chip";s.textContent=g;ch.appendChild(s);});
  c.appendChild(el);});
 document.querySelectorAll("#langbar button").forEach(b=>b.classList.toggle("on",b.dataset.l===l));
 try{localStorage.setItem("pg_lang",l);}catch(e){}
}
const bar=document.getElementById("langbar");
ORDER.forEach(l=>{const b=document.createElement("button");b.textContent=I18N[l].name;b.dataset.l=l;b.onclick=()=>apply(l);bar.appendChild(b);});
let init="en";try{const s=localStorage.getItem("pg_lang");if(s&&I18N[s])init=s;else{const n=(navigator.language||"en").slice(0,2);if(I18N[n])init=n;}}catch(e){}
apply(init);
