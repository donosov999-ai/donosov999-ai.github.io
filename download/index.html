const ORDER=["en","ru","es","de","zh","hi"];
function apply(lang){
  const d=I18N[lang]||I18N.en;
  document.documentElement.lang=lang;
  if(d.title)document.title=d.title;
  var md=document.querySelector('meta[name="description"]');if(md&&d.desc)md.content=d.desc;
  document.querySelectorAll("[data-i18n]").forEach(el=>{el.innerHTML=d[el.getAttribute("data-i18n")]||"";});
  [["steps_mac"],["steps_win"],["steps_apk"]].forEach(([k])=>{
    const ol=document.getElementById(k); ol.innerHTML="";
    (d[k]||[]).forEach(s=>{const li=document.createElement("li");li.innerHTML=s;ol.appendChild(li);});
  });
  document.querySelectorAll("#langbar button").forEach(b=>b.classList.toggle("on",b.dataset.l===lang));
  try{localStorage.setItem("pg_lang",lang);}catch(e){}
}
const bar=document.getElementById("langbar");
ORDER.forEach(l=>{const b=document.createElement("button");b.textContent=I18N[l].name;b.dataset.l=l;b.onclick=()=>apply(l);bar.appendChild(b);});
let init="en";
try{const s=localStorage.getItem("pg_lang"); if(s&&I18N[s])init=s; else{const n=(navigator.language||"en").slice(0,2); if(I18N[n])init=n;}}catch(e){}
apply(init);
